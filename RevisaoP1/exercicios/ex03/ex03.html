<!doctype html>
<html lang="pt-br">
  <head>
    <!-- Configurações básicas da página -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ex03 - JavaScript</title>
    <!-- Arquivo de estilos da página -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <h1>Ex03 - JavaScript</h1>
    <h2>
      Leia base e altura do retângulo. Calcule e exiba a área e o perímetro do
      retângulo.
    </h2>
    <!-- Formulário: recebe base e altura do retângulo -->
    <form id="ex03" name="ex03" action="" method="post">
      <label for="base">Base:</label>
      <input type="number" id="base" name="base" />
      <label for="altura">Altura:</label>
      <input type="number" id="altura" name="altura" />
    </form>
    <!-- Botões de ação: calcular os resultados ou limpar os campos -->
    <button id="gerar" name="gerar" onclick="gerarResultado()">Calcular</button>
    <button id="limpar" name="limpar" onclick="limparDados()">Limpar</button>
    <br />
    <!-- Áreas de saída: cada parágrafo recebe a resposta via propriedade diferente -->
    <p><strong>1. Resultado innerText:</strong></p>
    <p id="resultado"></p>
    <p><strong>2. Resultado innerHTML:</strong></p>
    <p id="resultado1"></p>
    <p><strong>3. Resultado textContent:</strong></p>
    <p id="resultado2"></p>
    <br />
    <!-- Link de retorno ao menu principal -->
    <p>
      <a href="../index.php"
        ><i class="fa-solid fa-arrow-left"></i> Voltar Menu</a
      >
    </p>
    <!-- Script responsável pelos cálculos e limpeza -->
    <script src="js/ex03_resultado.js"></script>
  </body>
</html>
