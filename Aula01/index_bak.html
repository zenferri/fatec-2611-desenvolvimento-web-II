<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript - Nome e sobrenome</title>

    <link rel="stylesheet" href="css/styles.css">

    <!-- Font Awesome (necessário para os ícones) -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <h1>Entrada, processamento e saída</h1>

    <form id="nomes" action="" method="get">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Entre com seu nome" tabindex="1">

        <label for="sobrenome">Sobrenome:</label>
        <input type="text" id="sobrenome" placeholder="Entre com seu sobrenome" tabindex="2">

    </form>

    <!-- Botão juntar -->
    <button id="juntar" onclick="juntarNome()" tabindex="3">
        <i class="fa-solid fa-plus"></i> Juntar
    </button>

    <!-- Botão Prompt -->
    <button id="janela" onclick="janelaNome()" tabindex="4">
        <i class="fa-solid fa-window-maximize"></i> Prompt
    </button>

    <!-- Botão Escrever
    <button id="escrever" onclick="escreverNome()" tabindex="5">
        <i class="fa-solid fa-pencil"></i> Escrever
    </button> -->

    <button id="escrever" type="button" onclick="escreverNome()" tabindex="5">
        <i class="fa-solid fa-pencil"></i> Escrever
    </button>

    <!-- Botão Limpar -->
    <button id="limpar" onclick="limparDados()" tabindex="6">
        <i class="fa-solid fa-trash"></i> Limpar
    </button>

    <!-- Botão Imprimir -->
    <button id="imprimir" onclick="window.print()" tabindex="7">
        <i class="fa-solid fa-print"></i> Imprimir
    </button>

    <br><br>

    <p>Nome completo: (innerText)</p>
    <p id="nomecompleto">Vai aparecer o nome completo aqui</p>

    <p>Nome completo: (innerHTML)</p>
    <p id="nomecompleto1">Vai aparecer o nome completo 1 aqui</p>

    <p>Nome completo: (textContent)</p>
    <p id="nomecompleto2">Vai aparecer o nome completo 2 aqui</p>

    <!-- Área usada pela função escreverNome() -->
    <div id="resultado"></div>

    <script src="js/utilidades.js"></script>

</body>

</html>
